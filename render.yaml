# Render "Blueprint" — lets you deploy both services at once.
# In the Render dashboard: New > Blueprint > point at your GitHub repo containing this file.
# Docs: https://render.com/docs/blueprint-spec
#
# NOTE: Free-tier Render web services do not support persistent disks. This means
# the SQLite database resets to the seeded sample data whenever the backend
# service redeploys or restarts. This is fine for testing/demoing the app.
# For real production use with data that must persist permanently, upgrade to a
# paid Render plan with a disk, or migrate to a managed database
# (see "Upgrading the database" in README.md).

services:
  # ---------- Backend API ----------
  - type: web
    name: civicconnect-api
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm run seed && npm start
    envVars:
      - key: JWT_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://civicconnect-app.onrender.com
      - key: PORT
        value: 4000

  # ---------- Frontend (static site) ----------
  - type: web
    name: civicconnect-app
    runtime: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://civicconnect-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
